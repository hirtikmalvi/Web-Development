<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="/P2_Netflix Clone/styleNetflix.css">
</head>

<body>

    <div class="header">
        <nav class="navBar">
            <img src="/P2_Netflix Clone/images/logo.png" class="logo">
            <div>
                <button class="languageButton">English <img src="/P2_Netflix Clone/images/down-icon.png">
                </button>
                <button>Sign In</button>
            </div>
        </nav>

        <div class="headerContent">
            <h1>Unlimited movies, TV shows and more</h1>
            <h3>Watch anywhere. Cancel anytime.</h3>
            <p>Ready to watch? Enter your email to create or restart your membership.</p>
            <form class="emailSignUp">
                <input type="email" placeholder="Email address" required>
                <button type="submit">Get Started</button>
            </form>
        </div>
    </div>

</body>

</html>
